<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NZ Compound Interest Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 15px; }
    h2 { text-align: center; }
    label { display: block; margin-top: 10px; }
    input { margin: 5px 0; padding: 8px; width: 100%; box-sizing: border-box; }
    button { padding: 10px 20px; margin-top: 15px; display: block; width: 100%; cursor: pointer; }
    .result { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
  </style>
</head>
<body>

<h2>NZ Compound Interest Calculator</h2>

<label>Initial Investment ($)</label>
<input type="number" id="initial" placeholder="e.g. 5000">

<label>Monthly Contribution ($)</label>
<input type="number" id="monthly" placeholder="e.g. 200">

<label>Annual Interest Rate (%)</label>
<input type="number" id="rate" placeholder="e.g. 6">

<label>Years</label>
<input type="number" id="years" placeholder="e.g. 10">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<script>
function calculate() {
  let initial = parseFloat(document.getElementById('initial').value) || 0;
  let monthly = parseFloat(document.getElementById('monthly').value) || 0;
  let rate = (parseFloat(document.getElementById('rate').value) || 0) / 100 / 12;
  let years = parseFloat(document.getElementById('years').value) || 0;

  let months = years * 12;

  // Future Value Formula
  let total = initial * Math.pow(1 + rate, months);
  if (rate === 0) {
    total += monthly * months; // no interest
  } else {
    total += monthly * (Math.pow(1 + rate, months) - 1) / rate;
  }

  document.getElementById('result').innerHTML =
    "Estimated Total: $" + total.toFixed(2);
}
</script>

</body>
</html>
